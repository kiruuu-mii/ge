<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baliwified</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F2EB;
    --card: #FFFDF8;
    --ink: #1A1612;
    --muted: #7A736A;
    --accent: #C4621A;
    --accent-light: #F5E8DC;
    --border: #E0D8CC;
    --tag-bg: #EDE6DC;
    --tag-text: #5A4E42;
    --shadow: 0 2px 16px rgba(60,40,10,0.08);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.25rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    margin-top: 0.6rem;
    color: var(--muted);
    font-size: 1rem;
    max-width: 380px;
    margin-inline: auto;
    line-height: 1.6;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 2rem 2rem 1.75rem;
    width: 100%;
    max-width: 560px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  input[type="text"] {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: #B8AFA4;
  }

  button#split-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0.75rem 1.35rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    white-space: nowrap;
  }

  button#split-btn:hover { background: #A8521A; }
  button#split-btn:active { transform: scale(0.97); }

  .result-box {
    margin-top: 1.5rem;
    min-height: 64px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .syllable-display {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }

  .syl {
    font-family: 'DM Serif Display', serif;
    font-size: 1.7rem;
    color: var(--ink);
    letter-spacing: -0.3px;
    line-height: 1.2;
    animation: pop 0.25s ease;
  }

  .sep {
    font-family: 'DM Serif Display', serif;
    font-size: 1.7rem;
    color: var(--ink);
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin: 0 2px;
    user-select: none;
    animation: pop 0.25s ease;
  }

  @keyframes pop {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .count-badge {
    font-size: 0.78rem;
    font-weight: 500;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
    width: fit-content;
    margin-top: 2px;
  }

  .placeholder-text {
    color: #C5BDB5;
    font-size: 1.1rem;
    font-family: 'DM Mono', monospace;
    padding: 0.4rem 0;
  }

  .error-text {
    color: #B94A2A;
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    padding: 0.3rem 0;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0 1.25rem;
  }

  .history-label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 220px;
    overflow-y: auto;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    gap: 8px;
  }

  .history-item:hover { background: var(--accent-light); }

  .history-word {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--ink);
    font-weight: 500;
  }

  .history-result {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 200px;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
    float: right;
    font-family: 'DM Sans', sans-serif;
  }

  .clear-btn:hover { color: var(--accent); }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    padding: 4px 10px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
    width: fit-content;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .copy-btn.copied { border-color: #3B6D11; color: #3B6D11; background: #EAF3DE; }

  footer {
    margin-top: 2rem;
    color: #BEB6AC;
    font-size: 0.78rem;
    text-align: center;
  }

  @media (max-width: 480px) {
    .card { padding: 1.5rem 1.25rem; }
    .input-row { flex-direction: column; }
    button#split-btn { width: 100%; padding: 0.85rem; }
    .history-result { max-width: 130px; }
  }
</style>
</head>
<body>

<header>
  <h1>Baliw<span>ified</span></h1>
  <p>Gawa ni Joshua</p>
</header>

<div class="card">
  <div class="input-row">
    <input type="text" id="word-input" placeholder="Type a word…" autocomplete="off" spellcheck="false" maxlength="60">
    <button id="split-btn" onclick="handleSplit()">Gew →</button>
  </div>

  <div class="result-box" id="result-box">
    <span class="placeholder-text">— — —</span>
  </div>

  <div id="history-section" style="display:none;">
    <hr class="divider">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem;">
      <span class="history-label">Recent words</span>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<footer>Press Enter or click Split · Click a history item to reload it</footer>

<script>
  const input = document.getElementById('word-input');
  const resultBox = document.getElementById('result-box');
  const historySection = document.getElementById('history-section');
  const historyList = document.getElementById('history-list');

  let history = JSON.parse(localStorage.getItem('syl_history') || '[]');

  function splitSyllables(word) {
    word = word.toLowerCase();
    function isVowel(ch, pos) {
      return "aeiou".includes(ch) || (ch === 'y' && pos > 0);
    }
    let syllables = [];
    let current = "";
    let i = 0;
    const n = word.length;
    while (i < n) {
      const char = word[i];
      current += char;
      if (isVowel(char, i)) {
        let j = i + 1;
        let consonants = [];
        while (j < n && !isVowel(word[j], j)) {
          consonants.push(word[j]);
          j++;
        }
        const hasNextVowel = j < n;
        if (hasNextVowel) {
          const nc = consonants.length;
          if (nc === 0) {
            syllables.push(current); current = "";
          } else if (nc === 1) {
            syllables.push(current); current = "";
          } else {
            const keep = Math.floor(nc / 2);
            current += consonants.slice(0, keep).join("");
            syllables.push(current);
            current = consonants.slice(keep).join("");
            i = j - 1;
          }
        }
      }
      i++;
    }
    if (current) syllables.push(current);
    return syllables;
  }

  function handleSplit() {
    const word = input.value.trim();
    if (!word) {
      resultBox.innerHTML = '<span class="error-text">Please enter a word first.</span>';
      return;
    }
    if (/[^a-zA-Z]/.test(word)) {
      resultBox.innerHTML = '<span class="error-text">Letters only, please.</span>';
      return;
    }

    const syllables = splitSyllables(word);
    renderResult(syllables, word);
    addToHistory(word, syllables);
  }

  function renderResult(syllables, word) {
    let html = '<div class="syllable-display">';
    syllables.forEach((s, i) => {
      html += `<span class="syl">${s}</span>`;
      if (i < syllables.length - 1) html += `<span class="sep">is</span>`;
    });
    html += '</div>';
    const count = syllables.length;
    html += `<div style="display:flex;align-items:center;gap:8px;margin-top:2px;">`;
    html += `<span class="count-badge">${count} syllable${count !== 1 ? 's' : ''}</span>`;
    html += `<button class="copy-btn" id="copy-btn" onclick="copyOutput('${syllables.join(' is ')}')">&#x2398; Copy</button>`;
    html += `</div>`;
    resultBox.innerHTML = html;
  }

  function copyOutput(text) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = '&#x2398; Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function addToHistory(word, syllables) {
    history = history.filter(h => h.word.toLowerCase() !== word.toLowerCase());
    history.unshift({ word, result: syllables.join(' is ') });
    if (history.length > 12) history = history.slice(0, 12);
    localStorage.setItem('syl_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      historySection.style.display = 'none';
      return;
    }
    historySection.style.display = 'block';
    historyList.innerHTML = history.map((h, i) =>
      `<div class="history-item" onclick="loadHistory(${i})">
        <span class="history-word">${h.word}</span>
        <span class="history-result">${h.result}</span>
      </div>`
    ).join('');
  }

  function loadHistory(i) {
    const item = history[i];
    input.value = item.word;
    const syllables = splitSyllables(item.word);
    renderResult(syllables, item.word);
    input.focus();
  }

  function clearHistory() {
    history = [];
    localStorage.removeItem('syl_history');
    historySection.style.display = 'none';
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSplit();
  });

  renderHistory();
</script>
</body>
</html>
